<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .header { margin-bottom: 24px; text-align: center; }
        .logo { max-width: 150px; height: auto; }

        .stats-bar {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            padding: 32px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin: 0 0 24px 0; font-size: 1.25rem; font-weight: 600; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }

        input, select, textarea { 
            width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; 
            box-sizing: border-box; font-size: 1rem; outline: none; background-color: #f8fafc; transition: all 0.2s ease;
        }

        input:focus, textarea:focus, select:focus { border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .category-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: #e0e7ff; color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .tag:hover { background: var(--primary); color: white; }

        .btn-submit { 
            width: 100%; background-color: var(--primary); color: white; padding: 16px; border: none; 
            border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; transition: all 0.2s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Notificación Flotante */
        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 40px;
            border-radius: 100px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            text-align: center;
            border: 2px solid #dcfce7;
        }

        #notification span { color: #166534; font-weight: 600; font-size: 1.1rem; }

        #status { margin-top: 20px; text-align: center; padding: 14px; border-radius: 12px; font-weight: 500; display: none; }
        .error { background: #fee2e2; color: #991b1b; display: block !important; }

        input[type="file"] { padding: 10px; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="notification"><span>✨ ¡Producto creado con éxito!</span></div>

<div class="header">
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
</div>

<div class="stats-bar">
    🚀 Sesión actual: <span id="productCounter">0</span> productos cargados
</div>

<div class="container">
    <h2>Cargar Producto</h2>
    <form id="menuForm">
        <div class="form-group">
            <label>Nombre del Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Pizza Napolitana" required>
        </div>
        
        <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="precio" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria" placeholder="Escribe o selecciona abajo" required>
            <div id="tagCloud" class="category-tags"></div>
        </div>
        
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" rows="2"></textarea>
        </div>
        
        <div class="form-group">
            <label>Disponibilidad</label>
            <select id="disponible">
                <option value="Si">Disponible</option>
                <option value="No">Agotado</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Foto (Opcional)</label>
            <input type="file" id="foto" accept="image/*">
        </div>
        
        <button type="submit" id="submitBtn" class="btn-submit">Guardar Producto</button>
    </form>
    <div id="status"></div>
</div>
