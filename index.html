<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .logo {
            max-width: 150px;
            height: auto;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            padding: 32px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { 
            margin: 0 0 24px 0; 
            font-size: 1.25rem; 
            font-weight: 600;
            color: var(--text); 
            text-align: center; 
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            font-size: 0.8rem; 
            color: var(--text-light); 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            outline: none; 
            background-color: #f8fafc;
            transition: all 0.2s ease;
            color: var(--text);
        }

        input:focus, textarea:focus, select:focus { 
            border-color: var(--primary); 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
        }

        /* Contenedor de etiquetas de categoría */
        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            background: #e0e7ff;
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .tag:hover {
            background: var(--primary);
            color: white;
        }

        .btn-submit { 
            width: 100%; 
            background-color: var(--primary); 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 12px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #status { 
            margin-top: 20px; 
            text-align: center; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 500;
            font-size: 0.9rem;
            display: none; 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .success { background: #dcfce7; color: #166534; display: flex !important; align-items: center; justify-content: center; gap: 8px; }
        .error { background: #fee2e2; color: #991b1b; display: flex !important; align-items: center; justify-content: center; gap: 8px; }

        /* Estilo para el input file personalizado */
        input[type="file"] {
            padding: 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
</div>

<div class="container">
    <h2>Cargar Producto</h2>
    <form id="menuForm">
        <div class="form-group">
            <label>Nombre del Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Pizza Napolitana" required>
        </div>
        
        <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="precio" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria" placeholder="Escribe o selecciona abajo" required>
            <div id="tagCloud" class="category-tags">
                </div>
        </div>
        
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" rows="2" placeholder="Breve descripción de los ingredientes..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Disponibilidad</label>
            <select id="disponible">
                <option value="Si">Disponible</option>
                <option value="No">Agotado</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Foto</label>
            <input type="file" id="foto" accept="image/*" required>
        </div>
        
        <button type="submit" id="submitBtn" class="btn-submit">Guardar Producto</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxbtw-Od4LK4FWyscWUI57Nh6-e71TiDrrubCRWj1_QtEAuTLpYN48wV9SZzikDoxWK/exec";
    const form = document.getElementById('menuForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const tagCloud = document.getElementById('tagCloud');
    const inputCat = document.getElementById('categoria');

    // --- LÓGICA DE CATEGORÍAS INTELIGENTES ---
    let savedCategories = JSON.parse(localStorage.getItem('my_categories')) || ['Entradas', 'Platos', 'Bebidas'];

    function renderTags() {
        tagCloud.innerHTML = '';
        savedCategories.forEach(cat => {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerText = cat;
            tag.onclick = () => inputCat.value = cat;
            tagCloud.appendChild(tag);
        });
    }

    function saveNewCategory(newCat) {
        if (newCat && !savedCategories.includes(newCat)) {
            savedCategories.push(newCat);
            localStorage.setItem('my_categories', JSON.stringify(savedCategories));
            renderTags();
        }
    }

    // Inicializar etiquetas
    renderTags();

    // --- LÓGICA DE ENVÍO ---
    form.onsubmit = function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Subiendo...";
        status.style.display = "none";
        
        const catValue = inputCat.value.trim();
        const file = document.getElementById('foto').files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const formData = {
                nombre: document.getElementById('nombre').value,
                precio: document.getElementById('precio').value,
                categoria: catValue,
                descripcion: document.getElementById('descripcion').value,
                disponible: document.getElementById('disponible').value,
                foto: {
                    base64: e.target.result,
                    type: file.type,
                    name: file.name
                }
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify(formData)
            })
            .then(() => {
                status.innerHTML = "<span>✅ ¡Producto guardado con éxito!</span>";
                status.className = "success";
                
                // Guardamos la categoría si es nueva
                saveNewCategory(catValue);
                
                form.reset();
                renderTags(); // Volver a mostrar tags después del reset
                btn.disabled = false;
                btn.innerText = "Guardar Producto";
            })
            .catch(err => {
                status.innerHTML = "<span>❌ Error al enviar los datos</span>";
                status.className = "error";
                btn.disabled = false;
                btn.innerText = "Reintentar";
            });
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
