<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8; 
            --bg: #f1f5f9; 
            --card: #ffffff; 
            --text: #0f172a; 
            --text-light: #64748b; 
            --border: #e2e8f0;
            --success: #22c55e;
            --celeste: #0ea5e9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* Modal / Pop-up */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .modal-content h3 { margin-top: 0; font-weight: 700; color: var(--text); }
        .modal-content p { font-size: 0.9rem; color: var(--text-light); margin-bottom: 20px; }

        /* Interfaz principal */
        .header { margin-bottom: 20px; text-align: center; margin-top: 10px; }
        .logo { max-width: 130px; height: auto; }

        .stats-bar { 
            background: var(--primary); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            border: 1px solid var(--border); 
            margin-bottom: 30px; 
            box-sizing: border-box;
        }

        h2 { margin: 0 0 20px 0; font-size: 1.2rem; font-weight: 700; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            font-size: 1rem; 
            outline: none; 
            background-color: #f8fafc; 
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-submit { 
            width: 100%; background-color: var(--primary); color: white; padding: 16px; 
            border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; 
            cursor: pointer; margin-top: 10px; transition: all 0.2s;
        }

        .btn-submit:active { transform: scale(0.98); }

        /* Image Upload */
        .image-upload-wrapper {
            position: relative; border: 2px dashed #cbd5e1; border-radius: 16px;
            padding: 15px; text-align: center; background: #f8fafc; min-height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .preview-container {
            display: none; width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; background: white; z-index: 10; border-radius: 14px;
        }
        #imgPreview { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }

        /* Notificación */
        #notification { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px 40px; border-radius: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            z-index: 3000; display: none; text-align: center; border: 3px solid var(--success);
        }
        #notification span { color: var(--text); font-weight: 700; font-size: 1.2rem; display: block; }

        .category-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { background: #e0e7ff; color: var(--primary); padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        .history-container { width: 100%; max-width: 480px; padding-bottom: 40px; }
        .history-title { font-size: 0.8rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 12px; display: block; text-align: center; }
        .history-item { background: white; display: flex; align-items: center; padding: 12px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
        .history-img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
        
        .change-key-btn {
            background: none; border: none; color: white; text-decoration: underline; 
            font-size: 0.75rem; cursor: pointer; opacity: 0.8; margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="keyModal" class="modal-overlay">
    <div class="modal-content">
        <i data-lucide="key-round" style="color: var(--primary); margin-bottom: 10px;"></i>
        <h3>Llave de Acceso</h3>
        <p>Por favor, ingresa tu llave para gestionar el menú.</p>
        <input type="text" id="modalKeyInput" placeholder="Pega tu llave aquí..." style="margin-bottom: 15px;">
        <button onclick="saveKeyFromModal()" class="btn-submit">Entrar al Panel</button>
    </div>
</div>

<div id="notification">
    <i data-lucide="check-circle" style="color: var(--success); margin-bottom: 10px;" size="40"></i>
    <span>¡Carga Exitosa!</span>
</div>

<div class="header">
    <img src="https://lh3.googleusercontent.com/d/1SGywAsWA8FAiwUhOd03aEhsBzGrXgotX" alt="Logo" class="logo">
</div>

<div class="stats-bar">
    <i data-lucide="rocket" size="18"></i>
    <span><b><span id="productCounter">0</span></b> productos cargados</span>
</div>

<button class="change-key-btn" style="color: var(--text-light); margin-bottom: 20px;" onclick="showModal()">Cambiar Llave de Acceso</button>

<div class="container">
    <h2>Cargar Producto</h2>
    <form id="menuForm">
        <div class="form-group">
            <label>Nombre del Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Pizza Napolitana" required>
        </div>
        <div class="form-group">
            <label>Precio ($)</label>
            <input type="number" id="precio" placeholder="0.00" required>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria" placeholder="Escribe o selecciona abajo" required>
            <div id="tagCloud" class="category-tags"></div>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="descripcion" rows="2" placeholder="Detalles del producto..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Foto del Plato</label>
            <div class="image-upload-wrapper" id="dropZone">
                <i data-lucide="image-plus" size="28" style="color: var(--primary)"></i>
                <span style="font-size: 0.8rem; color: var(--text-light); margin-top: 5px;">Toca para subir imagen</span>
                <input type="file" id="foto" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5;">
                
                <div class="preview-container" id="previewContainer">
                    <button type="button" class="remove-img" id="removeImg" style="position: absolute; top: 10px; right: 10px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; z-index: 20;">×</button>
                    <img src="" id="imgPreview">
                </div>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Guardar Producto</button>
    </form>
    <div id="status"></div>
</div>

<div class="history-container">
    <span class="history-title">Recientemente agregados</span>
    <div id="historyList"></div>
</div>

<script>
    // Inicializar iconos
    lucide.createIcons();

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaZJSIDxuwiefw-ifrz5j79eSRxFbMFj_6zqF4mTCS0uxau6Frg4PDZFR1GfIeD-C-BA/exec";
    
    // Elementos
    const modal = document.getElementById('keyModal');
    const modalInput = document.getElementById('modalKeyInput');
    const form = document.getElementById('menuForm');
    const btn = document.getElementById('submitBtn');
    const notification = document.getElementById('notification');
    const counterDisplay = document.getElementById('productCounter');
    const historyList = document.getElementById('historyList');
    const fileInput = document.getElementById('foto');
    const previewContainer = document.getElementById('previewContainer');
    const imgPreview = document.getElementById('imgPreview');

    let productCount = 0;
    let savedCategories = JSON.parse(localStorage.getItem('my_categories')) || ['Bebidas', 'Cafetería', 'Entradas', 'Platos'];

    // LÓGICA MODAL (LLAVE DE ACCESO)
    window.onload = () => {
        const key = localStorage.getItem('user_sheet_key');
        if (!key) {
            showModal();
        }
    };

    function showModal() {
        modal.style.display = 'flex';
        modalInput.value = localStorage.getItem('user_sheet_key') || '';
    }

    function saveKeyFromModal() {
        const val = modalInput.value.trim();
        if (val) {
            localStorage.setItem('user_sheet_key', val);
            modal.style.display = 'none';
        } else {
            alert("Por favor ingresa una Llave de Acceso");
        }
    }

    // FORMATEO DE TEXTO
    const preposiciones = ['de', 'del', 'la', 'las', 'los', 'el', 'a', 'al', 'en', 'con', 'por', 'para', 'y', 'o', 'u', 'e', 'sin', 'sobre', 'entre', 'hasta', 'desde'];
    function toTitleCase(str) {
        return str.toLowerCase().split(' ').map((word, index) => {
            if (word === '') return '';
            if (index === 0) return word.charAt(0).toUpperCase() + word.slice(1);
            return preposiciones.includes(word) ? word : word.charAt(0).toUpperCase() + word.slice(1);
        }).join(' ');
    }

    document.getElementById('nombre').addEventListener('input', function() { this.value = toTitleCase(this.value); });
    document.getElementById('categoria').addEventListener('input', function() { this.value = toTitleCase(this.value); });

    // MANEJO DE IMAGEN
    fileInput.onchange = function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imgPreview.src = e.target.result;
                previewContainer.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('removeImg').onclick = () => {
        fileInput.value = '';
        previewContainer.style.display = 'none';
    };

    // CONFETI (Celeste y Verde)
    function launchConfetti() {
        const count = 200;
        const defaults = { origin: { y: 0.7 } };

        function fire(particleRatio, opts) {
            confetti(Object.assign({}, defaults, opts, {
                particleCount: Math.floor(count * particleRatio),
                colors: ['#0ea5e9', '#22c55e', '#ffffff'] // Celeste, Verde, Blanco
            }));
        }

        fire(0.25, { spread: 26, startVelocity: 55 });
        fire(0.2, { spread: 60 });
        fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
        fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
        fire(0.1, { spread: 120, startVelocity: 45 });
    }

    function showSuccess() {
        notification.style.display = 'block';
        launchConfetti();
        setTimeout(() => { notification.style.display = 'none'; }, 3000);
    }

    function renderTags() {
        const tagCloud = document.getElementById('tagCloud');
        tagCloud.innerHTML = '';
        savedCategories.sort().forEach(cat => {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.innerText = cat;
            tag.onclick = () => document.getElementById('categoria').value = cat;
            tagCloud.appendChild(tag);
        });
    }

    renderTags();

    // ENVÍO DEL FORMULARIO
    form.onsubmit = function(e) {
        e.preventDefault();
        const sheetKey = localStorage.getItem('user_sheet_key');
        if (!sheetKey) { showModal(); return; }

        btn.disabled = true;
        btn.innerText = "Guardando...";
        
        const nombreVal = document.getElementById('nombre').value;
        const precioVal = document.getElementById('precio').value;
        const catValue = document.getElementById('categoria').value;
        const file = fileInput.files[0];

        const sendData = (fotoObj = null) => {
            const formData = {
                sheetKey: sheetKey,
                nombre: nombreVal,
                precio: precioVal,
                categoria: catValue,
                descripcion: document.getElementById('descripcion').value,
                disponible: "Si",
                foto: fotoObj
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify(formData)
            })
            .then(() => {
                showSuccess();
                productCount++;
                counterDisplay.innerText = productCount;
                
                // Historial
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <img src="${fotoObj ? fotoObj.base64 : 'https://via.placeholder.com/50'}" class="history-img">
                    <div style="flex-grow:1">
                        <span style="display:block; font-weight:600; font-size:0.9rem;">${nombreVal}</span>
                        <span style="color:var(--primary); font-weight:700;">$ ${precioVal}</span>
                    </div>
                `;
                historyList.prepend(item);

                // Reset
                form.reset();
                previewContainer.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "Guardar Producto";
                
                if (!savedCategories.includes(catValue)) {
                    savedCategories.push(catValue);
                    localStorage.setItem('my_categories', JSON.stringify(savedCategories));
                    renderTags();
                }
            })
            .catch(err => {
                alert("Hubo un error. Verifica tu Llave de Acceso.");
                btn.disabled = false;
                btn.innerText = "Guardar Producto";
            });
        };

        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                sendData({ base64: e.target.result, type: file.type, name: file.name });
            };
            reader.readAsDataURL(file);
        } else {
            sendData(null);
        }
    };
</script>
</body>
</html>
